<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Truthexa | Fake News Detection</title>
    <meta name="description" content="Detect fake news in Odia and regional Indian languages.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%236366f1'/><stop offset='100%' stop-color='%23ec4899'/></linearGradient></defs><path d='M16 28s10-5 10-13V7L16 3 6 7v8c0 8 10 13 10 13z' fill='url(%23g)'/><polyline points='11 16 14 19 21 12' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ───── History Bottom Sheet ───── -->
    <div class="history-overlay" id="historyOverlay" onclick="closeHistory()"></div>
    <div class="history-sheet" id="historySheet">
        <div class="history-handle"></div>
        <div class="history-sheet-header">
            <span class="history-sheet-title">Recent Verifications</span>
            <button class="history-sheet-close" onclick="closeHistory()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="history-sheet-body">
            <div class="history-list" id="historyList">
                <!-- Populated by JS -->
            </div>
            <button class="clear-history-btn" id="clearHistoryBtn" onclick="clearHistory()" style="display:none;">Clear History</button>
        </div>
    </div>

    <!-- ───── App Shell ───── -->
    <div id="appShell">
        <!-- Header -->
        <header>
            <div class="header-left">
                <div class="logo-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:white;">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        <path d="m9 11 2 2 4-4"></path>
                    </svg>
                </div>
                <span class="logo-text">TRUTHEXA</span>
            </div>
            <div class="header-right">
                <a href="https://github.com/srutiswarupa/truthexa" target="_blank" rel="noopener noreferrer" class="header-btn" aria-label="GitHub" style="text-decoration:none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
                        <path d="M9 18c-4.51 2-5-2-7-2"></path>
                    </svg>
                </a>
                <button class="header-btn" onclick="toggleHistory()" aria-label="History">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main id="mainContent">
            <!-- Hero — shown when no conversation exists -->
            <div class="hero" id="heroSection">
                <div class="hero-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        <path d="m9 11 2 2 4-4"></path>
                    </svg>
                </div>
                <h1 class="hero-title">Verify Regional News</h1>
                <p class="hero-desc">Type or paste Odia news below to check its credibility.</p>
            </div>

            <!-- Sample News Chips -->
            <div class="sample-chips" id="sampleChips">
                <div class="chips-scroll">
                    <button class="chip" onclick="useSample(0)" data-index="0">
                        <span class="chip-dot"></span>
                        ମୁଖ୍ୟମନ୍ତ୍ରୀ ନୂତନ ଯୋଜନା
                    </button>
                    <button class="chip" onclick="useSample(1)" data-index="1">
                        <span class="chip-dot"></span>
                        କଟକରେ ନୂଆ ପୁଲ
                    </button>
                    <button class="chip" onclick="useSample(2)" data-index="2">
                        <span class="chip-dot"></span>
                        ସ୍ୱାସ୍ଥ୍ୟ ବିଭାଗ ଡେଙ୍ଗୁ ସଚେତନତା
                    </button>
                    <button class="chip danger" onclick="useSample(3)" data-index="3">
                        <span class="chip-dot"></span>
                        ⚠️ ପ୍ଲାଷ୍ଟିକ ଚାଉଳ
                    </button>
                    <button class="chip danger" onclick="useSample(4)" data-index="4">
                        <span class="chip-dot"></span>
                        ⚠️ ନାସା ଅନ୍ଧକାର
                    </button>
                </div>
            </div>

            <!-- Chat Messages -->
            <div class="chat-container" id="chatContainer">
                <!-- Message bubbles injected by JS -->
            </div>
        </main>

        <!-- Model Badge — subtle tag above input like WhatsApp encryption notice -->
        <div class="model-badge">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            TF-IDF Guarded
        </div>

        <!-- Fixed Bottom Input Bar -->
        <div class="input-bar" id="inputBar">
            <div class="input-bar-inner">
                <textarea class="input-textarea" id="newsInput" rows="1" placeholder="Type or paste Odia news..." oninput="handleInput()" enterkeyhint="send"></textarea>
                <button class="send-btn" id="sendBtn" onclick="analyzeNews()" disabled aria-label="Analyse">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="script.js"></script>
</body>
</html>
