<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Truthexa | Fake News Detection</title>
    <meta name="description" content="Detect fake news in Odia and regional Indian languages.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%236366f1'/><stop offset='100%' stop-color='%23ec4899'/></linearGradient></defs><path d='M16 28s10-5 10-13V7L16 3 6 7v8c0 8 10 13 10 13z' fill='url(%23g)'/><polyline points='11 16 14 19 21 12' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <!-- Preload the Google Fonts (same fonts used by both versions) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Prevent flash of unstyled content */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #070913;
            color: #f3f4f6;
            font-family: 'Plus Jakarta Sans', 'Outfit', sans-serif;
        }
        #loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 16px;
        }
        .loader-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader-spinner"></div>
        <div style="font-size:0.85rem;color:#9ca3af;font-weight:500;">Loading Truthexa...</div>
    </div>

    <script>
        (function() {
            const BREAKPOINT = 768;
            const SS_KEY = 'truthexa_version';

            function getDesiredVersion() {
                return window.innerWidth > BREAKPOINT ? 'desktop' : 'mobile';
            }

            // Prevent reload loops: if we just switched versions, don't reload again
            const prevVersion = sessionStorage.getItem(SS_KEY);
            const desiredVersion = getDesiredVersion();

            if (prevVersion && prevVersion !== desiredVersion) {
                // The user resized across the breakpoint — reload to switch versions
                sessionStorage.setItem(SS_KEY, desiredVersion);
                location.reload();
                return;
            }

            sessionStorage.setItem(SS_KEY, desiredVersion);

            // Load the appropriate version
            var version = desiredVersion;
            var basePath = version + '/';

            // Fetch the version's HTML
            fetch(basePath + 'index.html')
                .then(function(res) { if (!res.ok) throw new Error('Failed to load ' + version); return res.text(); })
                .then(function(html) {
                    // Parse and extract body content (strip <script> tags to avoid double-execution)
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(html, 'text/html');
                    var bodyContent = '';
                    var bodyChildren = doc.body.children;
                    for (var i = 0; i < bodyChildren.length; i++) {
                        if (bodyChildren[i].tagName !== 'SCRIPT') {
                            bodyContent += bodyChildren[i].outerHTML;
                        }
                    }

                    // Get inline styles from head (besides the main stylesheet)
                    var inlineStyles = '';
                    var headChildren = doc.head.children;
                    for (var j = 0; j < headChildren.length; j++) {
                        var el = headChildren[j];
                        if (el.tagName === 'STYLE') {
                            inlineStyles += el.outerHTML;
                        }
                    }

                    // Replace body content
                    document.body.innerHTML = bodyContent;
                    if (inlineStyles) {
                        document.head.insertAdjacentHTML('beforeend', inlineStyles);
                    }

                    // Remove the loading screen styling
                    document.getElementById('loading-screen')?.remove();

                    // Load the version's stylesheet
                    var link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = basePath + 'style.css';
                    document.head.appendChild(link);

                    // Load the version's script
                    var script = document.createElement('script');
                    script.src = basePath + 'script.js';
                    script.onload = function() {
                        // Dispatch event so JS knows it's ready
                        document.dispatchEvent(new Event('truthexa-ready'));
                    };
                    document.body.appendChild(script);
                })
                .catch(function(err) {
                    document.getElementById('loading-screen').innerHTML =
                        '<div style="color:#ef4444;font-size:0.9rem;">Failed to load Truthexa. Please refresh the page.</div>' +
                        '<div style="color:#6b7280;font-size:0.75rem;margin-top:8px;">' + err.message + '</div>';
                });

            // Listen for resize crossing the breakpoint
            var lastWidth = window.innerWidth;
            window.addEventListener('resize', function() {
                var currentWidth = window.innerWidth;
                var crossed = (lastWidth > BREAKPOINT && currentWidth <= BREAKPOINT) ||
                              (lastWidth <= BREAKPOINT && currentWidth > BREAKPOINT);
                if (crossed) {
                    sessionStorage.setItem(SS_KEY, currentWidth > BREAKPOINT ? 'desktop' : 'mobile');
                    location.reload();
                }
                lastWidth = currentWidth;
            });
        })();
    </script>
</body>
</html>
